<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Portfolio</title>
<!-- 禁止搜索引擎索引 admin 页面 -->
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f; --bg2: #111118; --bg3: #1a1a24; --bg4: #22222f;
    --accent: #00d4aa; --accent2: #6366f1; --accent3: #f59e0b;
    --text: #e8e8f0; --text2: #9090a8; --text3: #5a5a72;
    --border: rgba(255,255,255,0.07); --border2: rgba(0,212,170,0.25);
    --mono: 'JetBrains Mono', monospace; --sans: 'Space Grotesk', sans-serif;
    --radius: 8px; --radius-lg: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
    background-size: 48px 48px; pointer-events: none; z-index: 0;
  }

  /* LOGIN SCREEN */
  #login-screen {
    position: fixed; inset: 0; z-index: 200;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 0;
  }
  .login-box {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 2.5rem 2rem; width: 340px;
  }
  .login-logo { font-family: var(--mono); font-size: 12px; color: var(--accent); margin-bottom: 1.75rem; letter-spacing: 0.1em; }
  .login-title { font-size: 1.4rem; font-weight: 600; color: var(--text); margin-bottom: 0.35rem; }
  .login-sub { font-size: 13px; color: var(--text3); font-family: var(--mono); margin-bottom: 1.75rem; }
  .login-box input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); padding: 11px 14px; border-radius: var(--radius);
    font-family: var(--mono); font-size: 14px; outline: none; margin-bottom: 0.75rem;
    transition: border-color 0.2s;
  }
  .login-box input:focus { border-color: var(--border2); }
  .login-error { font-size: 11px; color: #e24b4a; font-family: var(--mono); margin-bottom: 0.5rem; display: none; }
  .login-attempts { font-size: 10px; color: var(--text3); font-family: var(--mono); margin-top: 0.75rem; text-align: center; }
  .back-link { font-size: 12px; color: var(--text3); font-family: var(--mono); text-decoration: none; text-align: center; display: block; margin-top: 1.25rem; transition: color 0.2s; }
  .back-link:hover { color: var(--accent); }

  /* ADMIN UI */
  #admin-ui { display: none; min-height: 100vh; padding-top: 60px; position: relative; z-index: 1; }
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(10,10,15,0.92); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 2rem; height: 60px;
  }
  .nav-logo { font-family: var(--mono); font-size: 13px; color: var(--accent); letter-spacing: 0.05em; }
  .nav-right { display: flex; align-items: center; gap: 12px; }
  .nav-session { font-size: 11px; color: var(--text3); font-family: var(--mono); }

  .admin-container { max-width: 1020px; margin: 0 auto; padding: 2rem; }
  .admin-tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
  .admin-tab {
    background: none; border: none; border-bottom: 2px solid transparent;
    color: var(--text2); font-family: var(--mono); font-size: 12px;
    padding: 10px 16px; cursor: pointer; letter-spacing: 0.05em;
    transition: color 0.2s, border-color 0.2s; margin-bottom: -1px;
  }
  .admin-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .admin-panel { display: none; }
  .admin-panel.active { display: block; }

  /* EDITOR */
  .editor-actions { display: flex; gap: 8px; margin-bottom: 1rem; justify-content: space-between; align-items: center; flex-wrap: wrap; }
  .editor-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1rem; }
  .editor-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; height: 62vh; }
  .editor-pane { display: flex; flex-direction: column; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .editor-pane-header { padding: 8px 14px; border-bottom: 1px solid var(--border); font-size: 11px; color: var(--text3); font-family: var(--mono); letter-spacing: 0.05em; display: flex; justify-content: space-between; align-items: center; }
  #md-input { flex: 1; background: transparent; border: none; color: var(--text); font-family: var(--mono); font-size: 13px; line-height: 1.7; padding: 1rem; resize: none; outline: none; }
  .preview-body { flex: 1; overflow-y: auto; padding: 1rem; font-size: 14px; color: var(--text2); line-height: 1.8; }
  .preview-body h1,.preview-body h2,.preview-body h3 { color: var(--text); margin: 1rem 0 0.5rem; }
  .preview-body code { font-family: var(--mono); background: var(--bg3); padding: 1px 5px; border-radius: 3px; font-size: 12px; color: var(--accent); }
  .preview-body pre { background: var(--bg3); padding: 0.75rem; border-radius: 6px; overflow-x: auto; margin: 0.75rem 0; }
  .preview-body pre code { background: none; padding: 0; }
  .preview-body blockquote { border-left: 2px solid var(--accent); padding-left: 0.75rem; color: var(--text3); font-style: italic; margin: 0.75rem 0; }
  .preview-body p { margin-bottom: 0.75rem; }
  .preview-body ul,.preview-body ol { padding-left: 1.25rem; margin-bottom: 0.75rem; }
  .preview-body img { max-width: 100%; border-radius: 6px; }
  .preview-body .katex-display { margin: 1rem 0; overflow-x: auto; }

  /* FORMS */
  .profile-form { display: flex; flex-direction: column; gap: 1rem; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-label { font-size: 11px; color: var(--text3); font-family: var(--mono); letter-spacing: 0.05em; }
  .form-input { background: var(--bg2); border: 1px solid var(--border); color: var(--text); padding: 9px 12px; border-radius: var(--radius); font-family: var(--sans); font-size: 13px; outline: none; transition: border-color 0.2s; width: 100%; }
  .form-input:focus { border-color: var(--border2); }
  .form-textarea { background: var(--bg2); border: 1px solid var(--border); color: var(--text); padding: 10px 12px; border-radius: var(--radius); font-family: var(--sans); font-size: 13px; outline: none; resize: vertical; min-height: 80px; transition: border-color 0.2s; width: 100%; line-height: 1.6; }
  .form-textarea:focus { border-color: var(--border2); }
  .form-input-editor { background: var(--bg2); border: 1px solid var(--border); color: var(--text); padding: 9px 12px; border-radius: var(--radius); font-family: var(--sans); font-size: 13px; outline: none; transition: border-color 0.2s; width: 100%; }
  .form-input-editor:focus { border-color: var(--border2); }

  /* BUTTONS */
  .btn-save { background: var(--accent); color: #0a0a0f; border: none; padding: 9px 18px; border-radius: var(--radius); font-family: var(--mono); font-size: 12px; font-weight: 600; cursor: pointer; letter-spacing: 0.05em; transition: opacity 0.2s; }
  .btn-save:hover { opacity: 0.85; }
  .btn-secondary { background: none; border: 1px solid var(--border); color: var(--text2); padding: 9px 14px; border-radius: var(--radius); font-family: var(--mono); font-size: 12px; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
  .btn-secondary:hover { border-color: var(--border2); color: var(--accent); }
  .btn-danger { background: none; border: 1px solid rgba(226,75,74,0.3); color: #e24b4a; padding: 9px 14px; border-radius: var(--radius); font-family: var(--mono); font-size: 12px; cursor: pointer; transition: background 0.2s; }
  .btn-danger:hover { background: rgba(226,75,74,0.1); }
  .upload-area { border: 1px dashed var(--border); border-radius: var(--radius); padding: 9px 14px; text-align: center; font-size: 12px; color: var(--text3); font-family: var(--mono); cursor: pointer; transition: border-color 0.2s, background 0.2s; display: inline-block; }
  .upload-area:hover { border-color: var(--border2); background: rgba(0,212,170,0.03); color: var(--accent); }

  /* POST / PROJECT / EXP LIST */
  .admin-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .admin-item { display: flex; align-items: center; gap: 1rem; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; transition: border-color 0.2s; }
  .admin-item:hover { border-color: rgba(0,212,170,0.2); }
  .admin-item-name { flex: 1; font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .admin-item-date { font-size: 11px; color: var(--text3); font-family: var(--mono); white-space: nowrap; }
  .admin-item-actions { display: flex; gap: 6px; }
  .btn-icon { background: none; border: 1px solid var(--border); color: var(--text2); width: 28px; height: 28px; border-radius: var(--radius); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; transition: border-color 0.2s, color 0.2s; }
  .btn-icon:hover { border-color: var(--border2); color: var(--accent); }
  .btn-icon.del:hover { border-color: rgba(226,75,74,0.4); color: #e24b4a; }

  /* SUBFORM (project / exp edit) */
  .subform { display:none; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; margin-top: 1rem; }

  /* PASSWORD CHANGE */
  .pw-section { background: var(--bg2); border: 1px solid rgba(226,75,74,0.2); border-radius: var(--radius-lg); padding: 1.5rem; margin-top: 2rem; }
  .pw-section h3 { font-family: var(--mono); font-size: 12px; color: #e24b4a; margin-bottom: 1rem; letter-spacing: 0.05em; }

  /* TOAST */
  #toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--bg2); border: 1px solid var(--border2); color: var(--accent); padding: 10px 16px; border-radius: var(--radius); font-family: var(--mono); font-size: 12px; z-index: 999; transform: translateY(80px); opacity: 0; transition: all 0.3s; }
  #toast.show { transform: translateY(0); opacity: 1; }

  /* LOCKOUT */
  #lockout-screen { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 300; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; text-align: center; }
  #lockout-screen.show { display: flex; }
  .lockout-icon { font-size: 3rem; }
  .lockout-title { font-size: 1.2rem; font-weight: 600; color: var(--text); }
  .lockout-msg { font-size: 13px; color: var(--text3); font-family: var(--mono); }
  #lockout-countdown { font-size: 1.5rem; font-family: var(--mono); color: var(--accent); }

  @media (max-width: 640px) {
    .editor-layout, .form-row { grid-template-columns: 1fr; }
    .editor-layout { height: auto; }
    #md-input { min-height: 300px; }
    .editor-meta { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- LOCKOUT SCREEN -->
<div id="lockout-screen">
  <div class="lockout-icon">🔒</div>
  <div class="lockout-title">Too many failed attempts</div>
  <div class="lockout-msg">Try again in</div>
  <div id="lockout-countdown">5:00</div>
  <a href="index.html" class="back-link">← back to site</a>
</div>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">~/admin</div>
    <div class="login-title">Admin Access</div>
    <div class="login-sub">enter your password to continue</div>
    <div class="login-error" id="login-error">Incorrect password</div>
    <input type="password" id="login-pw" placeholder="password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-save" onclick="doLogin()" style="width:100%">enter →</button>
    <div class="login-attempts" id="attempts-display"></div>
    <a href="index.html" class="back-link">← back to site</a>
  </div>
</div>

<!-- ADMIN UI -->
<div id="admin-ui">
  <nav>
    <div class="nav-logo">~/admin panel</div>
    <div class="nav-right">
      <div class="nav-session" id="session-info"></div>
      <a href="index.html" class="btn-secondary" style="text-decoration:none;font-size:12px">← view site</a>
      <button class="btn-danger" onclick="logout()">logout</button>
    </div>
  </nav>

  <div class="admin-container">
    <div class="admin-tabs">
      <button class="admin-tab active" onclick="switchTab('blog',this)">blog</button>
      <button class="admin-tab" onclick="switchTab('profile',this)">profile</button>
      <button class="admin-tab" onclick="switchTab('projects',this)">projects</button>
      <button class="admin-tab" onclick="switchTab('experience',this)">experience</button>
      <button class="admin-tab" onclick="switchTab('security',this)">security</button>
    </div>

    <!-- ── BLOG ── -->
    <div class="admin-panel active" id="panel-blog">
      <div class="editor-actions">
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn-secondary" onclick="newPost()">+ new post</button>
          <div class="upload-area" onclick="document.getElementById('md-upload').click()">upload .md</div>
          <input type="file" id="md-upload" accept=".md,.markdown" style="display:none" onchange="uploadMd(this)">
          <div class="upload-area" onclick="document.getElementById('img-upload').click()">insert image</div>
          <input type="file" id="img-upload" accept="image/*" style="display:none" onchange="insertImage(this)">
          <button class="btn-secondary" onclick="togglePostList()">post list</button>
        </div>
        <button class="btn-save" onclick="savePost()">save post</button>
      </div>
      <div id="post-list-panel" style="display:none;margin-bottom:1rem;">
        <div class="admin-list" id="admin-post-list"></div>
      </div>
      <div class="editor-meta">
        <input class="form-input-editor" type="text" id="post-title-input" placeholder="Post title...">
        <input class="form-input-editor" type="text" id="post-tags-input" placeholder="Tags (comma separated)">
        <input type="hidden" id="editing-post-id">
      </div>
      <div class="editor-layout">
        <div class="editor-pane">
          <div class="editor-pane-header">
            <span>markdown</span>
            <span id="word-count" style="color:var(--text3);font-size:10px">0 words</span>
          </div>
          <textarea id="md-input" placeholder="# Post Title&#10;&#10;Start writing in Markdown...&#10;&#10;Math: $E = mc^2$ or $$\int f\,dx$$&#10;Image: ![alt](url)" oninput="renderPreview()"></textarea>
        </div>
        <div class="editor-pane">
          <div class="editor-pane-header"><span>preview</span></div>
          <div class="preview-body" id="md-preview"></div>
        </div>
      </div>
    </div>

    <!-- ── PROFILE ── -->
    <div class="admin-panel" id="panel-profile">
      <div class="profile-form">
        <div class="form-row">
          <div class="form-group"><label class="form-label">display name</label><input class="form-input" id="pf-name" placeholder="Your Name"></div>
          <div class="form-group"><label class="form-label">role / headline</label><input class="form-input" id="pf-role" placeholder="Full Stack Developer"></div>
        </div>
        <div class="form-group"><label class="form-label">bio</label><textarea class="form-textarea" id="pf-bio" rows="4" placeholder="Write a short bio..."></textarea></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">skills (comma separated)</label><input class="form-input" id="pf-skills" placeholder="React, Node.js, Python"></div>
          <div class="form-group"><label class="form-label">years of experience</label><input class="form-input" id="pf-exp" type="number" placeholder="3"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">email</label><input class="form-input" id="pf-email" placeholder="you@example.com"></div>
          <div class="form-group"><label class="form-label">github</label><input class="form-input" id="pf-github" placeholder="github.com/username"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">twitter / x</label><input class="form-input" id="pf-twitter" placeholder="twitter.com/username"></div>
          <div class="form-group"><label class="form-label">linkedin</label><input class="form-input" id="pf-linkedin" placeholder="linkedin.com/in/username"></div>
        </div>
        <button class="btn-save" onclick="saveProfile()" style="width:fit-content">save profile</button>
      </div>
    </div>

    <!-- ── PROJECTS ── -->
    <div class="admin-panel" id="panel-projects">
      <div style="display:flex;gap:8px;margin-bottom:1rem;">
        <button class="btn-secondary" onclick="addProjectForm()">+ add project</button>
      </div>
      <div class="admin-list" id="projects-admin-list"></div>
      <div class="subform" id="project-form">
        <div class="profile-form">
          <div class="form-row">
            <div class="form-group"><label class="form-label">project name</label><input class="form-input" id="proj-name" placeholder="My Awesome Project"></div>
            <div class="form-group"><label class="form-label">icon (emoji)</label><input class="form-input" id="proj-icon" placeholder="🚀"></div>
          </div>
          <div class="form-group"><label class="form-label">description</label><textarea class="form-textarea" id="proj-desc" rows="2" placeholder="What does this project do?"></textarea></div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">tags (comma separated)</label><input class="form-input" id="proj-tags" placeholder="React, Node.js, MongoDB"></div>
            <div class="form-group"><label class="form-label">link (optional)</label><input class="form-input" id="proj-link" placeholder="https://..."></div>
          </div>
          <input type="hidden" id="proj-edit-id">
          <div style="display:flex;gap:8px;">
            <button class="btn-save" onclick="saveProject()">save</button>
            <button class="btn-secondary" onclick="cancelProjectForm()">cancel</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ── EXPERIENCE ── -->
    <div class="admin-panel" id="panel-experience">
      <div style="display:flex;gap:8px;margin-bottom:1rem;">
        <button class="btn-secondary" onclick="addExpForm()">+ add experience</button>
      </div>
      <div class="admin-list" id="experience-admin-list"></div>
      <div class="subform" id="exp-form">
        <div class="profile-form">
          <div class="form-row">
            <div class="form-group"><label class="form-label">job title</label><input class="form-input" id="exp-title" placeholder="Senior Developer"></div>
            <div class="form-group"><label class="form-label">company</label><input class="form-input" id="exp-company" placeholder="Acme Corp"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">period</label><input class="form-input" id="exp-period" placeholder="Jan 2022 – Present"></div>
            <input type="hidden" id="exp-edit-id">
          </div>
          <div class="form-group"><label class="form-label">description</label><textarea class="form-textarea" id="exp-desc" rows="3" placeholder="What did you do?"></textarea></div>
          <div style="display:flex;gap:8px;">
            <button class="btn-save" onclick="saveExp()">save</button>
            <button class="btn-secondary" onclick="cancelExpForm()">cancel</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ── SECURITY ── -->
    <div class="admin-panel" id="panel-security">
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:1.5rem;">
        <h3 style="font-family:var(--mono);font-size:12px;color:var(--accent);margin-bottom:1rem;letter-spacing:0.05em;">// session info</h3>
        <div id="security-session-detail" style="font-size:13px;color:var(--text2);font-family:var(--mono);line-height:2;"></div>
      </div>

      <div class="pw-section">
        <h3>// change password</h3>
        <div class="profile-form">
          <div class="form-group">
            <label class="form-label">current password</label>
            <input class="form-input" type="password" id="pw-current" placeholder="current password">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">new password</label>
              <input class="form-input" type="password" id="pw-new" placeholder="min 8 characters">
            </div>
            <div class="form-group">
              <label class="form-label">confirm new password</label>
              <input class="form-input" type="password" id="pw-confirm" placeholder="repeat new password">
            </div>
          </div>
          <div id="pw-error" style="font-size:12px;color:#e24b4a;font-family:var(--mono);display:none;"></div>
          <button class="btn-danger" onclick="changePassword()" style="width:fit-content">update password</button>
        </div>
      </div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
//  PASSWORD CONFIG
//  改密码方法：打开浏览器控制台，运行：
//    await hashPassword('yourNewPassword')
//  把结果替换下面 STORED_HASH 的值
// ═══════════════════════════════════════════════════════
const DEFAULT_HASH = '240be518fabd2724ddb6f04eeb1da5967448d7e831c08c8fa822809f74c720a9'; // admin123
let STORED_HASH = localStorage.getItem('admin_pw_hash') || DEFAULT_HASH;

const MAX_ATTEMPTS = 5;
const LOCKOUT_MS = 5 * 60 * 1000; // 5 minutes

async function hashPassword(pw) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ── LOCKOUT ──
function getLockout() { return JSON.parse(localStorage.getItem('admin_lockout') || '{"attempts":0,"until":0}'); }
function setLockout(obj) { localStorage.setItem('admin_lockout', JSON.stringify(obj)); }

function checkLockout() {
  const l = getLockout();
  if(l.until > Date.now()) {
    showLockoutScreen(l.until);
    return true;
  }
  return false;
}

let lockoutTimer = null;
function showLockoutScreen(until) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('lockout-screen').classList.add('show');
  const tick = () => {
    const rem = Math.max(0, until - Date.now());
    if(rem <= 0) {
      document.getElementById('lockout-screen').classList.remove('show');
      document.getElementById('login-screen').style.display = 'flex';
      const l = getLockout(); l.attempts = 0; l.until = 0; setLockout(l);
      updateAttemptsDisplay();
      return;
    }
    const m = Math.floor(rem/60000), s = Math.floor((rem%60000)/1000);
    document.getElementById('lockout-countdown').textContent = `${m}:${s.toString().padStart(2,'0')}`;
    lockoutTimer = setTimeout(tick, 1000);
  };
  tick();
}

function updateAttemptsDisplay() {
  const l = getLockout();
  const rem = MAX_ATTEMPTS - l.attempts;
  const el = document.getElementById('attempts-display');
  if(l.attempts > 0 && rem > 0) {
    el.textContent = `${rem} attempt${rem!==1?'s':''} remaining`;
  } else { el.textContent = ''; }
}

// ── LOGIN ──
async function doLogin() {
  if(checkLockout()) return;
  const pw = document.getElementById('login-pw').value;
  if(!pw) return;
  const hash = await hashPassword(pw);
  const l = getLockout();
  if(hash === STORED_HASH) {
    l.attempts = 0; l.until = 0; setLockout(l);
    sessionStorage.setItem('admin_authed', '1');
    sessionStorage.setItem('admin_login_time', Date.now());
    document.getElementById('login-screen').style.display = 'none';
    showAdminUI();
  } else {
    l.attempts = (l.attempts||0) + 1;
    if(l.attempts >= MAX_ATTEMPTS) {
      l.until = Date.now() + LOCKOUT_MS;
      setLockout(l);
      showLockoutScreen(l.until);
    } else {
      setLockout(l);
      document.getElementById('login-error').style.display = 'block';
      document.getElementById('login-pw').value = '';
      document.getElementById('login-pw').focus();
      updateAttemptsDisplay();
    }
  }
}

function logout() {
  sessionStorage.removeItem('admin_authed');
  sessionStorage.removeItem('admin_login_time');
  window.location.reload();
}

// ── INIT ──
window.addEventListener('load', () => {
  if(checkLockout()) return;
  if(sessionStorage.getItem('admin_authed') === '1') {
    document.getElementById('login-screen').style.display = 'none';
    showAdminUI();
  } else {
    updateAttemptsDisplay();
    setTimeout(()=>document.getElementById('login-pw').focus(), 100);
  }
});

function showAdminUI() {
  document.getElementById('admin-ui').style.display = 'block';
  const loginTime = new Date(parseInt(sessionStorage.getItem('admin_login_time')||Date.now()));
  document.getElementById('session-info').textContent = 'logged in ' + loginTime.toLocaleTimeString();
  document.getElementById('security-session-detail').innerHTML =
    `login time: ${loginTime.toLocaleString()}<br>session: active (tab only)<br>auto-logout: on tab close`;
  loadData();
  loadProfileForm();
  renderAdminPosts();
  renderAdminProjects();
  renderAdminExp();
}

// ── DATA ──
let data = {};
function loadData() {
  data = JSON.parse(localStorage.getItem('portfolio_data') || '{}');
  if(!data.profile) data.profile = { name:'Your Name', role:'Full Stack Developer', bio:'Welcome.', skills:'JavaScript,React,Node.js', exp:'3', email:'', github:'', twitter:'', linkedin:'' };
  if(!data.posts) data.posts = [];
  if(!data.projects) data.projects = [];
  if(!data.experience) data.experience = [];
}
function save() { localStorage.setItem('portfolio_data', JSON.stringify(data)); }

// ── TABS ──
function switchTab(tab, btn) {
  document.querySelectorAll('.admin-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.admin-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
}

// ── BLOG EDITOR ──
let postListOpen = false;
function togglePostList() {
  postListOpen = !postListOpen;
  document.getElementById('post-list-panel').style.display = postListOpen ? 'block' : 'none';
  if(postListOpen) renderAdminPosts();
}

function renderAdminPosts() {
  const el = document.getElementById('admin-post-list');
  el.innerHTML = data.posts.length
    ? data.posts.slice().reverse().map(p => `
        <div class="admin-item">
          <div class="admin-item-name">${p.title}</div>
          <div class="admin-item-date">${p.date}</div>
          <div class="admin-item-actions">
            <button class="btn-icon" onclick="editPost('${p.id}')" title="edit">✎</button>
            <button class="btn-icon del" onclick="deletePost('${p.id}')" title="delete">✕</button>
          </div>
        </div>`).join('')
    : '<div style="font-size:12px;color:var(--text3);font-family:var(--mono);padding:0.5rem">no posts yet</div>';
}

function newPost() {
  ['post-title-input','post-tags-input','md-input'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('editing-post-id').value = '';
  document.getElementById('md-preview').innerHTML = '';
  document.getElementById('word-count').textContent = '0 words';
}

function editPost(id) {
  const post = data.posts.find(p=>p.id===id);
  if(!post) return;
  document.getElementById('post-title-input').value = post.title;
  document.getElementById('post-tags-input').value = post.tags || '';
  document.getElementById('md-input').value = post.content;
  document.getElementById('editing-post-id').value = id;
  renderPreview();
}

function deletePost(id) {
  if(!confirm('Delete this post?')) return;
  data.posts = data.posts.filter(p=>p.id!==id);
  save(); renderAdminPosts(); toast('Post deleted');
}

function savePost() {
  const title = document.getElementById('post-title-input').value.trim();
  const content = document.getElementById('md-input').value;
  const tags = document.getElementById('post-tags-input').value.trim();
  const editId = document.getElementById('editing-post-id').value;
  if(!title) { toast('Please add a title'); return; }
  if(editId) {
    const post = data.posts.find(p=>p.id===editId);
    if(post) { post.title=title; post.content=content; post.tags=tags; }
  } else {
    data.posts.push({ id:'post_'+Date.now(), title, content, tags,
      date: new Date().toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}) });
  }
  save(); renderAdminPosts(); toast('Post saved!');
}

function uploadMd(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const text = e.target.result;
    const titleMatch = text.match(/^#\s+(.+)/m);
    document.getElementById('post-title-input').value = titleMatch ? titleMatch[1] : file.name.replace(/\.md$/,'');
    document.getElementById('md-input').value = text;
    document.getElementById('editing-post-id').value = '';
    renderPreview(); toast('File loaded!');
  };
  reader.readAsText(file);
  input.value = '';
}

function insertImage(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const textarea = document.getElementById('md-input');
    const alt = file.name.replace(/\.[^.]+$/,'');
    const md = `\n![${alt}](${e.target.result})\n`;
    const pos = textarea.selectionStart;
    textarea.value = textarea.value.slice(0,pos) + md + textarea.value.slice(pos);
    textarea.selectionStart = textarea.selectionEnd = pos + md.length;
    renderPreview(); toast('Image inserted!');
  };
  reader.readAsDataURL(file);
  input.value = '';
}

function renderPreview() {
  const text = document.getElementById('md-input').value;
  document.getElementById('md-preview').innerHTML = marked.parse(text);
  renderMath(document.getElementById('md-preview'));
  const wc = wordCount(text);
  document.getElementById('word-count').textContent = wc + ' word' + (wc!==1?'s':'');
}

function renderMath(el) {
  if(typeof renderMathInElement === 'undefined') return;
  renderMathInElement(el, {
    delimiters: [
      {left:'$$', right:'$$', display:true}, {left:'$', right:'$', display:false},
      {left:'\\(', right:'\\)', display:false}, {left:'\\[', right:'\\]', display:true},
    ], throwOnError: false
  });
}

function wordCount(t) { return (t||'').split(/\s+/).filter(Boolean).length; }

// ── PROFILE ──
function loadProfileForm() {
  const p = data.profile;
  ['name','role','bio','skills','exp','email','github','twitter','linkedin'].forEach(k => {
    const el = document.getElementById('pf-'+k);
    if(el) el.value = p[k] || '';
  });
}

function saveProfile() {
  data.profile = {
    name: document.getElementById('pf-name').value,
    role: document.getElementById('pf-role').value,
    bio: document.getElementById('pf-bio').value,
    skills: document.getElementById('pf-skills').value,
    exp: document.getElementById('pf-exp').value,
    email: document.getElementById('pf-email').value,
    github: document.getElementById('pf-github').value,
    twitter: document.getElementById('pf-twitter').value,
    linkedin: document.getElementById('pf-linkedin').value,
  };
  save(); toast('Profile saved!');
}

// ── PROJECTS ──
function renderAdminProjects() {
  document.getElementById('projects-admin-list').innerHTML = data.projects.map(p => `
    <div class="admin-item">
      <div class="admin-item-name">${p.icon} ${p.name}</div>
      <div class="admin-item-actions">
        <button class="btn-icon" onclick="editProjectForm('${p.id}')">✎</button>
        <button class="btn-icon del" onclick="deleteProject('${p.id}')">✕</button>
      </div>
    </div>`).join('') || '<div style="font-size:12px;color:var(--text3);font-family:var(--mono);padding:0.5rem">no projects yet</div>';

function addProjectForm() {
  ['proj-name','proj-icon','proj-desc','proj-tags','proj-link'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('proj-edit-id').value = '';
  document.getElementById('project-form').style.display = 'block';
}
function editProjectForm(id) {
  const p = data.projects.find(x=>x.id===id); if(!p) return;
  document.getElementById('proj-name').value = p.name;
  document.getElementById('proj-icon').value = p.icon;
  document.getElementById('proj-desc').value = p.desc;
  document.getElementById('proj-tags').value = p.tags;
  document.getElementById('proj-link').value = p.link || '';
  document.getElementById('proj-edit-id').value = id;
  document.getElementById('project-form').style.display = 'block';
}
function cancelProjectForm() { document.getElementById('project-form').style.display = 'none'; }
function saveProject() {
  const name = document.getElementById('proj-name').value.trim();
  if(!name) { toast('Name required'); return; }
  const obj = { name, icon: document.getElementById('proj-icon').value||'📁', desc: document.getElementById('proj-desc').value, tags: document.getElementById('proj-tags').value, link: document.getElementById('proj-link').value };
  const editId = document.getElementById('proj-edit-id').value;
  if(editId) { const idx = data.projects.findIndex(p=>p.id===editId); if(idx>-1) data.projects[idx]={...data.projects[idx],...obj}; }
  else data.projects.push({id:'proj_'+Date.now(),...obj});
  save(); cancelProjectForm(); renderAdminProjects(); toast('Project saved!');
}
function deleteProject(id) {
  if(!confirm('Delete?')) return;
  data.projects = data.projects.filter(p=>p.id!==id);
  save(); renderAdminProjects(); toast('Deleted');
}

// ── SECURITY / CHANGE PASSWORD ──
async function changePassword() {
  const current = document.getElementById('pw-current').value;
  const newPw = document.getElementById('pw-new').value;
  const confirm = document.getElementById('pw-confirm').value;
  const errEl = document.getElementById('pw-error');
  errEl.style.display = 'none';

  const currentHash = await hashPassword(current);
  if(currentHash !== STORED_HASH) { errEl.textContent = 'current password is incorrect'; errEl.style.display='block'; return; }
  if(newPw.length < 8) { errEl.textContent = 'new password must be at least 8 characters'; errEl.style.display='block'; return; }
  if(newPw !== confirm) { errEl.textContent = 'passwords do not match'; errEl.style.display='block'; return; }

  const newHash = await hashPassword(newPw);
  STORED_HASH = newHash;
  localStorage.setItem('admin_pw_hash', newHash);
  ['pw-current','pw-new','pw-confirm'].forEach(id=>document.getElementById(id).value='');
  toast('Password updated successfully!');
}

// ── TOAST ──
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}
</script>
