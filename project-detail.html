<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" sizes="32x32"
      href="https://raw.githubusercontent.com/pennyzhaozhao/all-the-things/main/web_material/apple-touch-icon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project · Portfolio</title>
<meta name="robots" content="index, follow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
<style>
:root{
  --sans:'Inter',sans-serif;
  --serif:'Lora',serif;
  --mono:'JetBrains Mono',monospace;
  --radius:10px;
  --nav-h:64px;

  --bg:#ffffff;
  --bg2:#f6f8fa;
  --bg3:#f0f3f6;
  --panel:#ffffff;
  --text:#1f2328;
  --text2:#3d444d;
  --text3:#656d76;
  --text4:#8c959f;
  --border:#d8dee4;
  --border2:#c7d0d9;
  --accent:#2f81f7;
  --accent2:#1f6feb;
  --accent-soft:rgba(47,129,247,.10);
  --grid-line: rgba(47,129,247,.08);
  --tag-bg:#ddf4ff;
  --tag-color:#0969da;
  --tag-border:#b6e3ff;
  --code-bg:#f6f8fa;
  --code-border:#d8dee4;
  --blockquote-border:#54aeff;
  --nav-bg:rgba(255,255,255,.82);
  --shadow:0 1px 2px rgba(16,24,40,.05);
  --shadow-lg:0 12px 28px rgba(16,24,40,.10);
  --progress-bar:#2f81f7;
}
[data-theme="dark"]{
  --bg:#0d1117;
  --bg2:#161b22;
  --bg3:#21262d;
  --panel:#161b22;
  --text:#e6edf3;
  --text2:#c9d1d9;
  --text3:#8b949e;
  --text4:#6e7681;
  --border:#30363d;
  --border2:#3d444d;
  --accent:#58a6ff;
  --accent2:#79c0ff;
  --accent-soft:rgba(88,166,255,.10);
  --grid-line: rgba(88,166,255,.08);
  --tag-bg:rgba(56,139,253,.15);
  --tag-color:#79c0ff;
  --tag-border:rgba(88,166,255,.22);
  --code-bg:#161b22;
  --code-border:#30363d;
  --blockquote-border:#58a6ff;
  --nav-bg:rgba(13,17,23,.82);
  --shadow:0 1px 2px rgba(0,0,0,.28);
  --shadow-lg:0 18px 40px rgba(0,0,0,.35);
  --progress-bar:#58a6ff;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{
  font-family:var(--sans);
  background:
    linear-gradient(to right, var(--grid-line) 1px, transparent 1px),
    linear-gradient(to bottom, var(--grid-line) 1px, transparent 1px),
    var(--bg);
  background-size: 40px 40px;
  color:var(--text);
  line-height:1.75;
  transition:background .2s,color .2s;
}


a{color:inherit}
#progress-bar{position:fixed;top:0;left:0;height:3px;background:var(--progress-bar);z-index:220;width:0}
nav{
  position:fixed;top:0;left:0;right:0;z-index:200;height:var(--nav-h);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;background:var(--nav-bg);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);box-shadow:var(--shadow)
}
.nav-left,.nav-right{display:flex;align-items:center;gap:12px;min-width:0}
.nav-back{display:flex;align-items:center;gap:6px;text-decoration:none;color:var(--text3);font-size:14px;font-weight:600}
.nav-back:hover{color:var(--accent)}
.nav-divider{width:1px;height:18px;background:var(--border2)}
.nav-proj-name{font-size:14px;color:var(--text2);font-weight:600;max-width:320px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.theme-btn,.nav-link-btn{
  height:36px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;transition:.15s ease;text-decoration:none
}
.theme-btn{width:36px;font-size:15px}
.theme-btn:hover,.nav-link-btn:hover{background:var(--bg3)}
.nav-link-btn{padding:0 12px;font-size:13px;font-weight:600;color:var(--accent);gap:6px}
.project-hero{margin-top:var(--nav-h);width:100%;height:320px;position:relative;overflow:hidden;background:var(--bg2)}
.project-hero img{width:100%;height:100%;object-fit:cover;display:block}
.project-hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 35%,rgba(0,0,0,.55))}
.no-hero{margin-top:var(--nav-h);height:24px}
.page-shell{max-width:1400px;margin:0 auto;padding:28px 24px 72px}
.page-grid{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:32px;align-items:start}
.content-col{min-width:0}
.sidebar-col{min-width:0}
.project-header{padding:8px 0 24px;border-bottom:1px solid var(--border);margin-bottom:28px}
.project-emoji{font-size:2.5rem;display:block;line-height:1;margin-bottom:14px}
.project-title{font-family:var(--serif);font-size:clamp(2rem,3.5vw,2.8rem);line-height:1.2;margin-bottom:12px}
.project-subtitle{font-size:16px;color:var(--text3);max-width:820px;margin-bottom:16px}
.project-meta-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.project-tags-list{display:flex;gap:8px;flex-wrap:wrap}
.tag{font:500 12px var(--mono);color:var(--tag-color);background:var(--tag-bg);border:1px solid var(--tag-border);padding:4px 10px;border-radius:999px}
.project-meta-sep,.project-read-time{color:var(--text4);font-size:12px;font-family:var(--mono)}
.project-ext-link{display:inline-flex;align-items:center;gap:6px;text-decoration:none;font-size:12px;font-weight:600;color:var(--accent);padding:5px 10px;border:1px solid var(--tag-border);background:var(--tag-bg);border-radius:999px}
.project-content{font-size:16px;color:var(--text2)}
.project-content h1,.project-content h2,.project-content h3,.project-content h4{scroll-margin-top:calc(var(--nav-h) + 24px)}
.project-content h1{font-family:var(--serif);font-size:2rem;line-height:1.22;color:var(--text);margin:3rem 0 1rem}
.project-content h2{font-family:var(--serif);font-size:1.55rem;line-height:1.28;color:var(--text);margin:2.45rem 0 .85rem}
.project-content h3{font-size:1.12rem;font-weight:700;color:var(--text);margin:1.9rem 0 .55rem}
.project-content h4{font-size:.9rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text3);margin:1.4rem 0 .45rem}
.project-content p,.project-content ul,.project-content ol,.project-content table,.project-content pre,.project-content blockquote,.project-content figure,.project-content hr{margin-bottom:1.25rem}
.project-content a{color:var(--accent);text-decoration:underline;text-underline-offset:2px}
.project-content strong{color:var(--text)}
.project-content ul,.project-content ol{padding-left:1.5rem}
.project-content li{margin:.4rem 0}
.project-content code{font-family:var(--mono);font-size:.88em;background:var(--code-bg);border:1px solid var(--code-border);padding:2px 6px;border-radius:6px;color:var(--accent)}
.project-content pre{background:var(--code-bg);border:1px solid var(--code-border);padding:1.1rem 1.2rem;border-radius:12px;overflow:auto;box-shadow:var(--shadow)}
.project-content pre code{background:none;border:none;padding:0;color:var(--text)}
.project-content blockquote{padding:.95rem 1.1rem;border-left:4px solid var(--blockquote-border);background:var(--accent-soft);border-radius:0 12px 12px 0}
.project-content img{max-width:100%;display:block;border-radius:14px;box-shadow:var(--shadow-lg);margin:1.6rem 0}
.project-content table{width:100%;border-collapse:collapse;overflow:hidden;border-radius:12px;border:1px solid var(--border)}
.project-content th,.project-content td{padding:12px 14px;text-align:left;border-bottom:1px solid var(--border)}
.project-content th{background:var(--bg2);color:var(--text);font-size:13px}
.project-content td{color:var(--text2);font-size:14px}
.project-content hr{border:none;border-top:1px solid var(--border);margin:2rem 0}
.project-content .katex-display{overflow:auto;padding:.35rem 0}
.toc-wrap{
  position: sticky;
  top: calc(var(--nav-h) + 20px);
  height: calc(100vh - var(--nav-h) - 20px);
}
.toc-card{background:var(--panel);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);padding:18px 16px 18px 18px;max-height:calc(100vh - var(--nav-h) - 36px);display:flex;flex-direction:column}
.toc-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;padding:0 4px}
.toc-title{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:800;color:var(--text);letter-spacing:.02em}
.toc-title-icon{font-size:18px;color:var(--text3)}
.toc-count{font:italic 700 1rem var(--mono);color:var(--text4)}
.toc-scroll{
  flex: 1;                  /* ⭐关键 */
  overflow-y: auto;
}
.toc-scroll::-webkit-scrollbar{width:8px}
.toc-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:999px}
.toc-list{list-style:none;display:flex;flex-direction:column;gap:2px;border-left:1px solid var(--border2);padding-left:14px}
.toc-item a{display:block;text-decoration:none;color:var(--text3);font-size:13px;line-height:1.8;padding:6px 10px;border-radius:10px;transition:.15s ease;position:relative;word-break:break-word}
.toc-item a:hover{background:var(--bg2);color:var(--text)}
.toc-item.active>a{background:var(--accent-soft);color:var(--accent);font-weight:700}
.toc-item.active>a::before{content:'';position:absolute;left:-18px;top:6px;bottom:6px;width:3px;background:var(--accent);border-radius:999px}
.toc-item.level-2 a{padding-left:22px;font-size:12.5px}
.toc-item.level-3 a{padding-left:34px;font-size:12px;color:var(--text4)}
.project-footer{margin-top:48px;padding-top:22px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
.footer-link{text-decoration:none;font-size:13px;font-weight:600;color:var(--text3)}
.footer-link:hover{color:var(--accent)}
.loading-state,.error-state{min-height:40vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:12px}
.spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.loading-text{font:13px var(--mono);color:var(--text4)}
.error-msg{font-size:15px;color:var(--text3)}
.btn-back{text-decoration:none;font-size:14px;font-weight:700;color:var(--accent);padding:10px 16px;border:1px solid var(--tag-border);background:var(--tag-bg);border-radius:12px}
@keyframes spin{to{transform:rotate(360deg)}}
@media (max-width: 1100px){
  .page-grid{grid-template-columns:minmax(0,1fr) 280px;gap:24px}
}
@media (max-width: 900px){
  .page-grid{grid-template-columns:1fr}
  .sidebar-col{order:-1}
  .toc-wrap{position:static}
  .toc-card{max-height:none}
}
@media (max-width: 640px){
  :root{--nav-h:58px}
  nav{padding:0 14px}
  .nav-proj-name{max-width:140px}
  .nav-link-btn{display:none}
  .project-hero{height:220px}
  .page-shell{padding:20px 14px 56px}
  .project-title{font-size:1.7rem}
}
</style>
</head>
<body>
<div id="progress-bar"></div>
<nav>
  <div class="nav-left">
    <a class="nav-back" href="index.html#page-projects"><span>←</span> <span>Projects</span></a>
    <div class="nav-divider"></div>
    <div class="nav-proj-name" id="nav-proj-name">Loading…</div>
  </div>
  <div class="nav-right">
    <button class="theme-btn" onclick="toggleTheme()" id="theme-btn" title="Toggle theme">☀️</button>
    <a class="nav-link-btn" id="nav-ext-link" href="#" target="_blank" style="display:none">↗ View project</a>
  </div>
</nav>
<div id="hero-slot"></div>
<div class="page-shell">
  <div id="content-slot">
    <div class="loading-state">
      <div class="spinner"></div>
      <div class="loading-text">loading project…</div>
    </div>
  </div>
</div>
<script>
function applyTheme(t){document.documentElement.setAttribute('data-theme',t);document.getElementById('theme-btn').textContent=t==='dark'?'🌙':'☀️';localStorage.setItem('proj_theme',t)}
function toggleTheme(){applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark')}
applyTheme(localStorage.getItem('proj_theme')||'dark')
window.addEventListener('scroll',()=>{const h=document.documentElement;const pct=h.scrollTop/(h.scrollHeight-h.clientHeight)*100;document.getElementById('progress-bar').style.width=Math.min(pct,100)+'%'})
const GITHUB_USER='pennyzhaozhao';
const GITHUB_REPO='penny-website';
const BRANCH='main';
const RAW=`https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${BRANCH}`;
async function fetchJSON(path){try{const r=await fetch(`${RAW}/${path}?t=${Date.now()}`);return r.ok?r.json():null}catch{return null}}
async function fetchText(path){try{const r=await fetch(`${RAW}/${path}?t=${Date.now()}`);return r.ok?r.text():null}catch{return null}}
function slugify(text){return text.toLowerCase().trim().replace(/[\s\W-]+/g,'-').replace(/^-+|-+$/g,'') || 'section'}
function addHeadingIds(container){
  const used=new Set();
  container.querySelectorAll('h1,h2,h3').forEach((h,i)=>{
    let base=slugify(h.textContent)||`section-${i+1}`;
    let id=base,n=2;
    while(used.has(id)) id=`${base}-${n++}`;
    used.add(id); h.id=id;
  });
}
function buildTocData(container){
  return [...container.querySelectorAll('h1,h2,h3')].map(h=>({id:h.id,text:h.textContent.trim(),level:Number(h.tagName[1])}))
}
function renderToc(items){
  if(!items.length) return '';
  return `
  <aside class="sidebar-col">
    <div class="toc-wrap">
      <div class="toc-card">
        <div class="toc-head">
          <div class="toc-title"><span class="toc-title-icon">☰</span><span>目录</span></div>
          <div class="toc-count">${items.length}</div>
        </div>
        <div class="toc-scroll">
          <ul class="toc-list" id="toc-list">
            ${items.map(item=>`<li class="toc-item level-${item.level}"><a href="#${item.id}" data-target="${item.id}">${item.text}</a></li>`).join('')}
          </ul>
        </div>
      </div>
    </div>
  </aside>`
}
function readTime(text){const wpm=220;const words=text.split(/\s+/).filter(Boolean).length;return Math.max(1,Math.ceil(words/wpm))+' min read'}
function setupTocSpy(){
  const links=[...document.querySelectorAll('#toc-list a')];
  const headingMap=new Map(links.map(a=>[a.dataset.target, a.parentElement]));
  const headings=[...document.querySelectorAll('.project-content h1,.project-content h2,.project-content h3')];
  if(!links.length || !headings.length) return;
  const setActive=id=>{headingMap.forEach(li=>li.classList.remove('active')); const li=headingMap.get(id); if(li) li.classList.add('active')}
  const observer=new IntersectionObserver(entries=>{
    const visible=entries.filter(e=>e.isIntersecting).sort((a,b)=>a.boundingClientRect.top-b.boundingClientRect.top);
    if(visible[0]) setActive(visible[0].target.id);
  },{rootMargin:'-90px 0px -60% 0px', threshold:[0,1]});
  headings.forEach(h=>observer.observe(h));
  links.forEach(link=>link.addEventListener('click',()=>{setActive(link.dataset.target)}));
  setActive(headings[0].id);
}
async function init(){
  const params=new URLSearchParams(location.search);
  const projId=params.get('id');
  if(!projId){showError('No project ID specified.');return;}
  const projects=await fetchJSON('projects.json');
  if(!projects){showError('Could not load projects list.');return;}
  const proj=projects.find(p=>p.id===projId);
  if(!proj){showError('Project not found.');return;}
  document.title=proj.name+' · Portfolio';
  document.getElementById('nav-proj-name').textContent=proj.name;
  if(proj.link){const el=document.getElementById('nav-ext-link'); el.href=proj.link; el.style.display='inline-flex';}
  document.getElementById('hero-slot').innerHTML=proj.image
    ? `<div class="project-hero"><img src="${proj.image}" alt="${proj.name}"><div class="project-hero-overlay"></div></div>`
    : '<div class="no-hero"></div>';
  const mdContent=proj.mdFile ? (await fetchText(proj.mdFile) || '') : '';
  const tagsHtml=(proj.tags||'').split(',').filter(Boolean).map(t=>`<span class="tag">${t.trim()}</span>`).join('');
  const bodyHtml=mdContent ? marked.parse(mdContent) : `<div class="error-state"><div>📄</div><div class="error-msg">No content yet for this project.</div></div>`;
  const temp=document.createElement('div');
  temp.innerHTML=bodyHtml;
  addHeadingIds(temp);
  const tocItems=buildTocData(temp);
  const header=`
    <div class="project-header">
      <span class="project-emoji">${proj.icon||'📁'}</span>
      <h1 class="project-title">${proj.name}</h1>
      ${proj.desc?`<p class="project-subtitle">${proj.desc}</p>`:''}
      <div class="project-meta-row">
        ${tagsHtml?`<div class="project-tags-list">${tagsHtml}</div>`:''}
        ${tagsHtml&&mdContent?`<span class="project-meta-sep">·</span>`:''}
        ${mdContent?`<span class="project-read-time">${readTime(mdContent)}</span>`:''}
        ${proj.link?`<a class="project-ext-link" href="${proj.link}" target="_blank">↗ View project</a>`:''}
      </div>
    </div>`;
  document.getElementById('content-slot').innerHTML=`
    <div class="page-grid">
      <main class="content-col">
        ${header}
        <div class="project-content" id="proj-body">${temp.innerHTML}</div>
        <div class="project-footer">
          <a class="footer-link" href="index.html#page-projects">← Back to all projects</a>
          ${proj.link?`<a class="footer-link" href="${proj.link}" target="_blank">↗ View on GitHub</a>`:''}
        </div>
      </main>
      ${renderToc(tocItems)}
    </div>`;
  if(typeof renderMathInElement!=='undefined'){
    renderMathInElement(document.getElementById('proj-body'),{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false},{left:'\\(',right:'\\)',display:false},{left:'\\[',right:'\\]',display:true}],throwOnError:false})
  }
  setupTocSpy();
}
function showError(msg){
  document.getElementById('hero-slot').innerHTML='<div class="no-hero"></div>';
  document.getElementById('content-slot').innerHTML=`<div class="error-state"><div>🔍</div><div class="error-msg">${msg}</div><a class="btn-back" href="index.html">← Back to projects</a></div>`
}
init();
</script>
</body>
</html>
